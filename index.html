<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>의류 상품 이미지 A/B 테스트</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
            margin: 0;
            padding: 30px;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        .product-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 280px;
        }

        img {
            width: 250px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 30px;
            font-size: 20px;
            color: #222;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>온라인 쇼핑몰 의류 이미지 A/B 테스트</h1>

    <p>
        어떤 상품 이미지가 더 관심을 유도하는지 선택해주세요.
    </p>

    <div class="container">

        <div class="product-box">
            <h3>A Type: 상품 단독 이미지</h3>
            <img src="product_only.jpg" alt="상품 단독 이미지">
            <br>
            <button onclick="vote('상품 단독 이미지')">관심 있음</button>
        </div>

        <div class="product-box">
            <h3>B Type: 모델 착용 이미지</h3>
            <img src="model_wearing.jpg" alt="모델 착용 이미지">
            <br>
            <button onclick="vote('모델 착용 이미지')">관심 있음</button>
        </div>

    </div>

    <p id="result"></p>

    <script>
        function vote(type) {
            document.getElementById("result").innerHTML =
                type + "가 선택되었습니다! 구매 의사를 측정합니다.";
        }
    </script>

</body>
</html>
